---
- name: Install rustup
  ansible.builtin.shell: |
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path
  args:
    creates: /home/sinder/.cargo/bin/rustup
  environment:
    HOME: /home/sinder
    RUSTUP_HOME: /home/sinder/.rustup
    CARGO_HOME: /home/sinder/.cargo
  become: true
  become_user: sinder

- name: Install stable toolchain
  ansible.builtin.shell: /home/sinder/.cargo/bin/rustup toolchain install stable
  environment:
    HOME: /home/sinder
    RUSTUP_HOME: /home/sinder/.rustup
    CARGO_HOME: /home/sinder/.cargo
  become: true
  become_user: sinder
  register: rustup_toolchain
  changed_when: "'stable' not in rustup_toolchain.stdout"

- name: Set stable as default
  ansible.builtin.shell: /home/sinder/.cargo/bin/rustup default stable
  environment:
    HOME: /home/sinder
    RUSTUP_HOME: /home/sinder/.rustup
    CARGO_HOME: /home/sinder/.cargo
  become: true
  become_user: sinder
  register: rustup_default
  changed_when: "'default' not in rustup_default.stdout"

- name: Install sqlx-cli
  ansible.builtin.shell: /home/sinder/.cargo/bin/cargo install sqlx-cli --no-default-features --features rustls,postgres
  args:
    creates: /home/sinder/.cargo/bin/sqlx
  environment:
    HOME: /home/sinder
    RUSTUP_HOME: /home/sinder/.rustup
    CARGO_HOME: /home/sinder/.cargo
  become: true
  become_user: sinder

- name: Install mask task runner
  ansible.builtin.shell: /home/sinder/.cargo/bin/cargo install mask
  args:
    creates: /home/sinder/.cargo/bin/mask
  environment:
    HOME: /home/sinder
    RUSTUP_HOME: /home/sinder/.rustup
    CARGO_HOME: /home/sinder/.cargo
  become: true
  become_user: sinder

- name: Ensure ~/.local/bin exists
  ansible.builtin.file:
    path: /home/sinder/.local/bin
    state: directory
    mode: '0755'
    owner: sinder
    group: sinder

- name: Install dbmate
  ansible.builtin.get_url:
    url: https://github.com/amacneil/dbmate/releases/latest/download/dbmate-linux-amd64
    dest: /home/sinder/.local/bin/dbmate
    mode: '0755'
    owner: sinder
    group: sinder

- name: Install zellij
  ansible.builtin.shell: |
    curl -fsSL https://github.com/zellij-org/zellij/releases/latest/download/zellij-x86_64-unknown-linux-musl.tar.gz \
      | tar -xz -C /home/sinder/.local/bin zellij
  args:
    creates: /home/sinder/.local/bin/zellij
